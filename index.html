<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0A3161" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="CL" />
  <meta name="description" content="CL — couple's lifestyle app for CFB, movies, games, notes, workouts, and more." />
  <title>CL</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <a href="#home" class="brand" style="text-decoration:none;color:inherit">
        <div class="brand-mark has-photo" id="header-avatar" aria-hidden="true">
          <img src="icons/icon-96.png" alt="" class="header-avatar-img" />
        </div>
        <div class="brand-text">
          <strong>CL</strong>
          <span class="day-counter" id="header-daycount" title="Days since April 11, 2026">—</span>
        </div>
      </a>
      <div class="header-actions">
        <a href="#profile" class="icon-btn" title="Profile" aria-label="Profile and settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="8" r="4"/></svg>
        </a>
        <button type="button" class="icon-btn" id="btn-home" title="Home" aria-label="Go to home">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-8.5z"/></svg>
        </button>
      </div>
    </header>

    <main id="main" aria-live="polite"></main>

    <nav class="bottom-nav bottom-nav-5" aria-label="Primary">
      <a href="#home" class="nav-item active" data-route="home">
        <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-8.5z"/></svg>
        <span>Home</span>
      </a>
      <a href="#cfb" class="nav-item" data-route="cfb">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18M5.5 5.5l13 13M18.5 5.5l-13 13"/></svg>
        <span>TTU·A&M</span>
      </a>
      <a href="#movies" class="nav-item" data-route="movies">
        <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 5v14M17 5v14M3 9h18M3 15h18"/></svg>
        <span>Movies</span>
      </a>
      <a href="#games" class="nav-item" data-route="games">
        <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4M8 10v4M15 11h.01M18 13h.01"/></svg>
        <span>Games</span>
      </a>
      <a href="#more" class="nav-item" data-route="more">
        <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="19" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg>
        <span>More</span>
      </a>
    </nav>
  </div>

  <div class="toast-host" id="toast-host" aria-live="polite"></div>
  <div id="modal-root"></div>

  <!-- Core -->
  <script src="js/storage.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/daycount.js"></script>
  <script src="js/data/movies.js"></script>
  <script src="js/data/cfb.js"></script>
  <script src="js/data/workouts.js"></script>
  <script src="js/components/rating.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/chat.js"></script>
  <script src="js/sections/home.js"></script>
  <script src="js/sections/profile.js"></script>
  <script src="js/sections/cfb.js"></script>
  <script src="js/sections/movies.js"></script>
  <script src="js/sections/fun.js"></script>
  <script src="js/sections/games.js"></script>
  <script src="js/sections/notes.js"></script>
  <script src="js/sections/books.js"></script>
  <script src="js/sections/workout.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
